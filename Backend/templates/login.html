<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | ReCircle Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2E8B57,#66BB6A);
}

.container{
width:400px;
background:#fff;
padding:40px;
border-radius:15px;
box-shadow:0 15px 30px rgba(0,0,0,.2);
}

.container h1{
text-align:center;
color:#2E8B57;
margin-bottom:10px;
}

.container p{
text-align:center;
margin-bottom:30px;
color:gray;
}

.input-box{
margin-bottom:20px;
}

.input-box label{
font-weight:600;
display:block;
margin-bottom:8px;
}

.input-box input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

.input-box input:focus{
outline:none;
border-color:#2E8B57;
}

button{
width:100%;
padding:13px;
background:#2E8B57;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1f6f45;
}

.message{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.register{
text-align:center;
margin-top:20px;
}

.register a{
color:#2E8B57;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Login</h1>

<p>Welcome Back to ReCircle Hub</p>

<form id="loginForm">

<div class="input-box">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password" id="password" required>
</div>

<button type="submit">Login</button>

</form>

<div class="message" id="msg"></div>

<div class="register">
Don't have an account?
<a href="/register">Register</a>
</div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit",async function(e){

e.preventDefault();

const response=await fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:document.getElementById("email").value,

password:document.getElementById("password").value

})

});

const data=await response.json();

if(data.success){

document.getElementById("msg").style.color="green";
document.getElementById("msg").innerHTML="Login Successful";

setTimeout(function(){

window.location="/dashboard";

},1000);

}
else{

document.getElementById("msg").style.color="red";
document.getElementById("msg").innerHTML=data.message;

}

});

</script>

</body>
</html>
